<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - FarmTrack</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/design-system.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: var(--color-white);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-2xl);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: var(--color-text-light);
            padding: var(--spacing-2xl) var(--spacing-lg);
            text-align: center;
        }

        .auth-logo {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }

        .auth-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-sm);
        }

        .auth-subtitle {
            font-size: var(--font-size-sm);
            opacity: 0.9;
        }

        .auth-body {
            padding: var(--spacing-2xl) var(--spacing-lg);
            max-height: 90vh;
            overflow-y: auto;
        }

        .auth-heading {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }

        .form-divider {
            margin: var(--spacing-lg) 0;
            text-align: center;
            color: var(--color-text-tertiary);
        }

        .form-divider::before,
        .form-divider::after {
            content: '';
            display: inline-block;
            width: 40%;
            height: 1px;
            background: var(--color-border);
            vertical-align: middle;
            margin: 0 var(--spacing-sm);
        }

        .auth-link-section {
            text-align: center;
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }

        .auth-link-text {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .auth-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-semibold);
            transition: all var(--transition-base);
        }

        .auth-link:hover {
            color: var(--color-primary-light);
            text-decoration: underline;
        }

        .password-requirements {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            margin-top: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--color-gray-50);
            border-radius: var(--radius-md);
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xs);
        }

        .requirement:last-child {
            margin-bottom: 0;
        }

        .requirement-icon {
            color: var(--color-gray-400);
            width: 16px;
            text-align: center;
        }

        .requirement-icon.met {
            color: var(--color-success);
        }

        .error-alert {
            animation: slideIn var(--transition-base);
        }

        @media (max-width: 480px) {
            .auth-body {
                padding: var(--spacing-lg);
            }

            .auth-header {
                padding: var(--spacing-xl) var(--spacing-md);
            }

            .auth-title {
                font-size: var(--font-size-xl);
            }

            .auth-logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <div class="auth-logo">🌾</div>
                <h1 class="auth-title">FarmTrack</h1>
                <p class="auth-subtitle">Farm Management System</p>
            </div>

            <!-- Body -->
            <div class="auth-body">
                <h2 class="auth-heading">Create Account</h2>

                <!-- Error Message -->
                <div id="errorMessage" class="alert alert-danger error-alert" style="display: none;">
                    <i class="fas fa-exclamation-circle" style="margin-right: var(--spacing-sm);"></i>
                    <span id="errorText"></span>
                </div>

                <!-- Register Form -->
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label" for="fullName">
                            <i class="fas fa-user" style="margin-right: var(--spacing-sm);"></i>
                            Full Name
                        </label>
                        <input
                            type="text"
                            class="form-control"
                            id="fullName"
                            placeholder="John Farmer"
                            required
                            autocomplete="name"
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">
                            <i class="fas fa-envelope" style="margin-right: var(--spacing-sm);"></i>
                            Email Address
                        </label>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">
                            <i class="fas fa-lock" style="margin-right: var(--spacing-sm);"></i>
                            Password
                        </label>
                        <div style="position: relative;">
                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                placeholder="••••••••"
                                required
                                autocomplete="new-password"
                            >
                            <button type="button" class="password-toggle" id="passwordToggle" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--color-text-secondary); cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-requirements">
                            <div class="requirement">
                                <span class="requirement-icon" id="lengthCheck">✗</span>
                                <span>At least 8 characters</span>
                            </div>
                            <div class="requirement">
                                <span class="requirement-icon" id="numberCheck">✗</span>
                                <span>At least one number</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">
                            <i class="fas fa-lock" style="margin-right: var(--spacing-sm);"></i>
                            Confirm Password
                        </label>
                        <div style="position: relative;">
                            <input
                                type="password"
                                class="form-control"
                                id="confirmPassword"
                                placeholder="••••••••"
                                required
                                autocomplete="new-password"
                            >
                            <button type="button" class="password-toggle" id="confirmPasswordToggle" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--color-text-secondary); cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div style="display: flex; align-items: flex-start; gap: var(--spacing-md); margin-bottom: var(--spacing-lg);">
                        <input type="checkbox" id="acceptTerms" required style="margin-top: 6px; cursor: pointer;">
                        <label style="font-size: var(--font-size-sm); color: var(--color-text-secondary); cursor: pointer;">
                            I agree to the Terms of Service and Privacy Policy
                        </label>
                    </div>

                    <button type="submit" class="btn btn-success" style="width: 100%;">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <!-- Divider -->
                <div class="form-divider">OR</div>

                <!-- Login Link -->
                <div class="auth-link-section">
                    <p class="auth-link-text">
                        Already have an account?
                        <a href="login.html" class="auth-link">Sign in</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p style="text-align: center; color: rgba(255, 255, 255, 0.7); margin-top: var(--spacing-2xl); font-size: var(--font-size-xs);">
            © 2025 FarmTrack. All rights reserved.
        </p>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase-app/10.0.0/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.0.0/firebase-auth.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.0.0/firebase-firestore.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        class RegisterPage {
            constructor() {
                this.init();
            }

            init() {
                firebase.auth().onAuthStateChanged((user) => {
                    if (user) {
                        window.location.href = 'index.html';
                    }
                });

                this.setupFormListeners();
                this.setupPasswordToggle();
                this.setupPasswordValidation();
            }

            setupFormListeners() {
                const form = document.getElementById('registerForm');
                if (form) {
                    form.addEventListener('submit', (e) => this.handleRegister(e));
                }
            }

            setupPasswordToggle() {
                [
                    { input: '#password', toggle: '#passwordToggle' },
                    { input: '#confirmPassword', toggle: '#confirmPasswordToggle' }
                ].forEach(({ input, toggle }) => {
                    const inputEl = document.querySelector(input);
                    const toggleBtn = document.querySelector(toggle);

                    if (toggleBtn && inputEl) {
                        toggleBtn.addEventListener('click', () => {
                            const isPassword = inputEl.type === 'password';
                            inputEl.type = isPassword ? 'text' : 'password';
                            toggleBtn.innerHTML = isPassword
                                ? '<i class="fas fa-eye-slash"></i>'
                                : '<i class="fas fa-eye"></i>';
                        });
                    }
                });
            }

            setupPasswordValidation() {
                const passwordInput = document.getElementById('password');

                if (passwordInput) {
                    passwordInput.addEventListener('input', () => {
                        const password = passwordInput.value;

                        const lengthCheck = document.getElementById('lengthCheck');
                        if (lengthCheck) {
                            if (password.length >= 8) {
                                lengthCheck.classList.add('met');
                                lengthCheck.textContent = '✓';
                            } else {
                                lengthCheck.classList.remove('met');
                                lengthCheck.textContent = '✗';
                            }
                        }

                        const numberCheck = document.getElementById('numberCheck');
                        if (numberCheck) {
                            if (/\d/.test(password)) {
                                numberCheck.classList.add('met');
                                numberCheck.textContent = '✓';
                            } else {
                                numberCheck.classList.remove('met');
                                numberCheck.textContent = '✗';
                            }
                        }
                    });
                }
            }

            async handleRegister(e) {
                e.preventDefault();

                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const acceptTerms = document.getElementById('acceptTerms').checked;

                if (!fullName || !email || !password || !confirmPassword) {
                    this.showError('Please fill in all fields');
                    return;
                }

                if (password !== confirmPassword) {
                    this.showError('Passwords do not match');
                    return;
                }

                if (password.length < 8) {
                    this.showError('Password must be at least 8 characters');
                    return;
                }

                if (!/\d/.test(password)) {
                    this.showError('Password must contain at least one number');
                    return;
                }

                if (!acceptTerms) {
                    this.showError('Please accept the Terms of Service');
                    return;
                }

                const btn = e.target.querySelector('button[type="submit"]');
                const originalHTML = btn.innerHTML;

                try {
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner" style="display: inline-block; width: 16px; height: 16px; margin-right: var(--spacing-sm);"></span>Creating account...';

                    const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);

                    await userCredential.user.updateProfile({
                        displayName: fullName
                    });

                    await firebase.firestore()
                        .collection('users')
                        .doc(userCredential.user.uid)
                        .set({
                            name: fullName,
                            email: email,
                            createdAt: new Date(),
                            expectedRevenue: 0,
                            lastLoginAt: new Date()
                        });

                    console.log('✓ User account created');
                    window.location.href = 'index.html';

                } catch (error) {
                    console.error('Registration error:', error);
                    this.showError(this.getErrorMessage(error.code));
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                }
            }

            showError(message) {
                const errorDiv = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');
                if (errorDiv && errorText) {
                    errorText.textContent = message;
                    errorDiv.style.display = 'flex';
                    setTimeout(() => {
                        errorDiv.style.display = 'none';
                    }, 5000);
                }
            }

            getErrorMessage(code) {
                const messages = {
                    'auth/email-already-in-use': 'This email is already registered',
                    'auth/invalid-email': 'Invalid email address',
                    'auth/weak-password': 'Password is too weak',
                    'auth/operation-not-allowed': 'Account creation is not available',
                    'auth/too-many-requests': 'Too many attempts. Please try again later.',
                };
                return messages[code] || 'Account creation failed. Please try again.';
            }
        }

        const registerPage = new RegisterPage();
    </script>
</body>
</html>
